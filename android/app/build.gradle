
apply plugin: 'com.android.application'

android {
    namespace "com.techvault.store"
    compileSdk 35

    defaultConfig {
        applicationId "com.techvault.store"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Fix for typo in some versions and ensuring web assets are not compressed
            noCompress 'foo', 'bar'
            ignoreAssetsPattern "!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // App Signing logic
            if (System.getenv("ANDROID_KEYSTORE_PATH") != null) {
                signingConfig signingConfigs.debug // We'll use the environment logic if needed, but typically handled by GitHub Actions
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    
    // Explicitly disabling the problematic property that causes build failures in some AGP versions
    // navigationRawResourcesSubset is not needed for standard Capacitor builds
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.core:core-splashscreen:1.0.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    
    // Use the project reference which is defined in settings.gradle
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}

// This file is generated by 'npx cap sync' - it's crucial for plugin injection
try {
    apply from: 'capacitor.build.gradle'
} catch (Exception e) {
    logger.warn("capacitor.build.gradle not found. Run 'npx cap sync' to generate it.")
}
