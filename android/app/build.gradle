
apply plugin: 'com.android.application'

android {
    namespace "com.techvault.store"
    compileSdk 35

    defaultConfig {
        applicationId "com.techvault.store"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Avoid encoding IDN for colors
             noCompress 'png'
        }
    }

    signingConfigs {
        release {
            if (System.getenv("ANDROID_KEYSTORE_PATH") != null) {
                storeFile file(System.getenv("ANDROID_KEYSTORE_PATH"))
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    // إزالة الخاصية المسببة للخطأ navigationRawResourcesSubset
    androidResources {
        noCompress 'png'
    }
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$appcompat_version"
    implementation "androidx.core:core-ktx:$core_version"
    implementation "com.google.android.material:material:$material_version"
    implementation "androidx.constraintlayout:constraintlayout:$constraint_layout_version"
    
    // ربط مشروع كاباسيتور الأساسي
    implementation project(':capacitor-android')

    testImplementation "junit:junit:$junit_version"
    androidTestImplementation "androidx.test.ext:junit:$androidx_junit_version"
    androidTestImplementation "androidx.test.espresso:espresso-core:$espresso_version"

    implementation "androidx.core:core-splashscreen:1.0.1"
}

// محاولة تطبيق إعدادات كاباسيتور إذا كانت موجودة
try {
    def capacitorBuildGradle = "../node_modules/@capacitor/android/capacitor/capacitor.build.gradle"
    if (file(capacitorBuildGradle).exists()) {
        apply from: capacitorBuildGradle
    }
} catch (Exception e) {
    println "Warning: Could not apply capacitor.build.gradle: ${e.message}"
}
