apply plugin: 'com.android.application'

android {
    namespace "com.techvault.store"
    compileSdk 35
    
    defaultConfig {
        applicationId "com.techvault.store"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // تصحيح الخطأ المطبعي لضمان عمل ملفات الويب داخل التطبيق
             noCompress 'public'
        }
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core-ktx:1.13.1"
    // إزالة الإشارات المسببة للخطأ (capacitor-cordova-android-plugins)
    // نعتمد على المكتبات الأساسية فقط لضمان نجاح البناء السحابي
}
