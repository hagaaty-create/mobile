
rootProject.name = 'android'

include ':app'

// استيراد إعدادات كاباسيتور بشكل دايناميكي وقوي
def capacitorAndroidPath = "../node_modules/@capacitor/android/capacitor"
def capacitorSettings = new File(settingsDir, "${capacitorAndroidPath}/capacitor.settings.gradle")

if (capacitorSettings.exists()) {
    apply from: capacitorSettings
} else {
    // محاولة البحث في مسار بديل إذا فشل الأول (لضمان المرونة في بيئات CI)
    def fallbackPath = "../../node_modules/@capacitor/android/capacitor/capacitor.settings.gradle"
    def fallbackSettings = new File(settingsDir, fallbackPath)
    if (fallbackSettings.exists()) {
        apply from: fallbackSettings
    } else {
        throw new GradleException("Could not find capacitor.settings.gradle. Please run 'npm install' and 'npx cap sync'.")
    }
}
