// سكريبت ديناميكي للبحث عن مكتبة Capacitor Android وربطها بالمشروع
include ':app'

// ربط مكتبة Capacitor Android يدوياً من مجلد node_modules
def capacitorAndroidPath = '../node_modules/@capacitor/android/capacitor'
def capacitorAndroidDir = new File(settingsDir, capacitorAndroidPath)

if (capacitorAndroidDir.exists()) {
    include ':capacitor-android'
    project(':capacitor-android').projectDir = capacitorAndroidDir
} else {
    // محاولة البحث في المسار البديل (أحياناً يختلف المسار حسب إصدار npm)
    def altPath = '../../node_modules/@capacitor/android/capacitor'
    def altDir = new File(settingsDir, altPath)
    if (altDir.exists()) {
        include ':capacitor-android'
        project(':capacitor-android').projectDir = altDir
    } else {
        println "WARNING: Capacitor Android project directory not found at ${capacitorAndroidDir.absolutePath}"
    }
}

// إضافة أي بلجنز إضافية يتم توليدها بواسطة كاباسيتور
apply from: '../node_modules/@capacitor/android/capacitor/capacitor.settings.gradle'
