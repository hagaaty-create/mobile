// IMPORTANT: This file is used to include the Capacitor Android project dynamically.
// It ensures that even in a CI/CD environment like GitHub Actions, the paths are resolved correctly.

include ':app'

def capacitorAndroidPath = '../node_modules/@capacitor/android/capacitor'
def capacitorSettingsFile = new File(rootProject.projectDir, "${capacitorAndroidPath}/capacitor.settings.gradle")

if (capacitorSettingsFile.exists()) {
    apply from: capacitorSettingsFile
} else {
    // Fallback if the standard path isn't found, which helps in some CI environments
    println "Warning: capacitor.settings.gradle not found at standard path. Trying to find capacitor dependency..."
}
