
include ':app'

// نقوم بتعريف مسار مكتبة كاباسيتور يدوياً لضمان العثور عليها في بيئة GitHub
def capacitorAndroidPath = new File(settingsDir, '../node_modules/@capacitor/android/capacitor')
if (capacitorAndroidPath.exists()) {
    include ':capacitor-android'
    project(':capacitor-android').projectDir = capacitorAndroidPath
}

// المزامنة التلقائية مع إضافات كاباسيتور
apply from: 'capacitor.settings.gradle'
