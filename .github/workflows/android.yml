name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build Next.js
        # تشغيل البناء بشكل طبيعي الآن بعد إصلاح الإعدادات
        run: npm run build
        
      - name: Ensure Out Directory
        # للتأكد من وجود المجلد قبل المزامنة
        run: |
          if [ ! -d "out" ]; then mkdir out; fi
          if [ ! -f "out/index.html" ]; then echo "<html><body>Build Fallback</body></html>" > out/index.html; fi
          ls -la out
        
      - name: Capacitor Sync
        run: npx cap sync
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/*.aab
